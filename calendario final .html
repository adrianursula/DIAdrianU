<!DOCTYPE html>

<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diario Sónico - v18 (Simplificado)</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

    <!-- <script src="https://cdn.jsdelivr.net/npm/jsmediatags@3.9.8/dist/jsmediatags.min.js"></script> --> <!-- V18: Eliminado -->

    <style>
        /* --- Sistema de Diseño: "Diario Sónico" (v13) --- */
        
        /* --- PALETA DE REFERENCIA (LIGHT) - TEMA "LOFI" (Key: #6750A4) --- */
        :root {
            /* Primary (Purple) */
            --md-ref-palette-primary-10: #21005D;
            --md-ref-palette-primary-40: #6750A4;
            --md-ref-palette-primary-90: #EADDFF;
            --md-ref-palette-primary-100: #FFFFFF;
            
            /* Secondary (Mint/Teal Accent) */
            --md-ref-palette-secondary-10: #002019;
            --md-ref-palette-secondary-40: #006B57;
            --md-ref-palette-secondary-90: #7BF8D9;
            
            /* Error */
            --md-ref-palette-error-40: #B3261E;
            --md-ref-palette-error-90: #F9DEDC;
            --md-ref-palette-error-10: #410E0B;
            
            /* Neutral (Indigo/Slate) */
            --md-ref-palette-neutral-10: #1B1B22;
            --md-ref-palette-neutral-20: #303036;
            --md-ref-palette-neutral-90: #E3E2E9;
            --md-ref-palette-neutral-94: #F2F0F7;
            --md-ref-palette-neutral-95: #F5F3FA;
            --md-ref-palette-neutral-99: #FEFBFF;
            --md-ref-palette-neutral-0: #000000;

            /* Neutral Variant (Indigo/Slate) */
            --md-ref-palette-neutral-variant-30: #46464F;
            --md-ref-palette-neutral-variant-50: #767680;
            --md-ref-palette-neutral-variant-80: #C7C6D0;
            --md-ref-palette-neutral-variant-90: #E3E2EC;
        }

        /* --- TOKENS DEL SISTEMA (LIGHT THEME) --- */
        :root, [data-theme="light"] {
            --md-sys-color-primary: var(--md-ref-palette-primary-40);
            --md-sys-color-on-primary: var(--md-ref-palette-primary-100);
            --md-sys-color-primary-container: var(--md-ref-palette-primary-90);
            --md-sys-color-on-primary-container: var(--md-ref-palette-primary-10);
            
            --md-sys-color-secondary: var(--md-ref-palette-secondary-40);
            --md-sys-color-on-secondary-container: var(--md-ref-palette-secondary-10);
            --md-sys-color-secondary-container: var(--md-ref-palette-secondary-90);
            
            --md-sys-color-surface: var(--md-ref-palette-neutral-99);
            --md-sys-color-on-surface: var(--md-ref-palette-neutral-10);
            --md-sys-color-on-surface-variant: var(--md-ref-palette-neutral-variant-30);
            --md-sys-color-outline: var(--md-ref-palette-neutral-variant-50);
            --md-sys-color-surface-container-highest: var(--md-ref-palette-neutral-90);
            --md-sys-color-surface-container: var(--md-ref-palette-neutral-94);
            --md-sys-color-surface-variant: var(--md-ref-palette-neutral-variant-90);
            --md-sys-color-surface-container-low: var(--md-ref-palette-neutral-95);
            
            --md-sys-color-scrim: var(--md-ref-palette-neutral-0);
            --md-sys-color-inverse-surface: var(--md-ref-palette-neutral-20);
            --md-sys-color-inverse-on-surface: var(--md-ref-palette-neutral-95);
            --md-sys-color-error-container: var(--md-ref-palette-error-90);
            --md-sys-color-on-error-container: var(--md-ref-palette-error-10);
        }
        
        /* --- PALETA DE REFERENCIA (DARK) - TEMA "LOFI" (Key: #BEA9FF) --- */
        @media (prefers-color-scheme: dark) {
            :root:not([data-theme="light"]) {
                /* Primary (Purple) */
                --md-ref-palette-primary-20: #381E72;
                --md-ref-palette-primary-30: #4F378B;
                --md-ref-palette-primary-80: #BEA9FF;
                
                /* Secondary (Mint/Teal Accent) */
                --md-ref-palette-secondary-30: #005141;
                --md-ref-palette-secondary-80: #5DEBCF;
                --md-ref-palette-secondary-90: #7BF8D9;
                
                /* Error */
                --md-ref-palette-error-80: #F2B8B5;
                --md-ref-palette-error-30: #8C1D18;
                
                /* Neutral (Indigo/Slate) - DARK THEME BASE */
                --md-ref-palette-neutral-6: #181920; /* Base Surface */
                --md-ref-palette-neutral-10: #1B1B22; /* Surface Container */
                --md-ref-palette-neutral-20: #303036; /* Surface Container Highest */
                --md-ref-palette-neutral-90: #E3E2E9; /* On Surface */
                
                /* Neutral Variant (Indigo/Slate) */
                --md-ref-palette-neutral-variant-30: #46464F; /* Surface Variant */
                --md-ref-palette-neutral-variant-60: #8F8F99; /* Outline */
                --md-ref-palette-neutral-variant-70: #A9A9B3; /* On Surface Variant */
            }
        }
        
        /* --- TOKENS DEL SISTEMA (DARK THEME) --- */
        @media (prefers-color-scheme: dark) {
            :root:not([data-theme="light"]), [data-theme="dark"] {
                --md-sys-color-primary: var(--md-ref-palette-primary-80);
                --md-sys-color-on-primary: var(--md-ref-palette-primary-20);
                --md-sys-color-primary-container: var(--md-ref-palette-primary-30);
                --md-sys-color-on-primary-container: var(--md-ref-palette-primary-90);
                
                --md-sys-color-secondary: var(--md-ref-palette-secondary-80);
                --md-sys-color-on-secondary-container: var(--md-ref-palette-secondary-90);
                --md-sys-color-secondary-container: var(--md-ref-palette-secondary-30);
                
                --md-sys-color-surface: var(--md-ref-palette-neutral-6);
                --md-sys-color-on-surface: var(--md-ref-palette-neutral-90);
                --md-sys-color-on-surface-variant: var(--md-ref-palette-neutral-variant-70);
                --md-sys-color-outline: var(--md-ref-palette-neutral-variant-60);
                --md-sys-color-surface-container-highest: var(--md-ref-palette-neutral-20);
                --md-sys-color-surface-container: var(--md-ref-palette-neutral-10);
                --md-sys-color-surface-variant: var(--md-ref-palette-neutral-variant-30);
                --md-sys-color-surface-container-low: var(--md-ref-palette-neutral-10);
                
                --md-sys-color-scrim: var(--md-ref-palette-neutral-0);
                --md-sys-color-inverse-surface: var(--md-ref-palette-neutral-90);
                --md-sys-color-inverse-on-surface: var(--md-ref-palette-neutral-20);
                --md-sys-color-error-container: var(--md-ref-palette-error-30);
                --md-sys-color-on-error-container: var(--md-ref-palette-error-80);
            }
        }
        
        /* --- Tokens de Tipografía (v13) --- */
        :root {
            --md-sys-font-family: "Inter", sans-serif;
            
            --md-sys-typescale-headline-small-font: var(--md-sys-font-family);
            --md-sys-typescale-headline-small-size: 1.5rem;
            --md-sys-typescale-headline-small-weight: 500;

            --md-sys-typescale-title-large-font: var(--md-sys-font-family);
            --md-sys-typescale-title-large-size: 1.375rem;
            --md-sys-typescale-title-large-weight: 500;
            
            --md-sys-typescale-title-medium-font: var(--md-sys-font-family);
            --md-sys-typescale-title-medium-size: 1rem;
            --md-sys-typescale-title-medium-weight: 600;

            --md-sys-typescale-title-small-font: var(--md-sys-font-family);
            --md-sys-typescale-title-small-size: 0.875rem;
            --md-sys-typescale-title-small-weight: 600;
            --md-sys-typescale-title-small-line-height: 1.25rem;

            --md-sys-typescale-body-large-font: var(--md-sys-font-family);
            --md-sys-typescale-body-large-size: 1rem;
            --md-sys-typescale-body-large-weight: 400;

            --md-sys-typescale-label-large-font: var(--md-sys-font-family);
            --md-sys-typescale-label-large-size: 0.875rem;
            --md-sys-typescale-label-large-weight: 500;
            
            --md-sys-typescale-label-medium-font: var(--md-sys-font-family);
            --md-sys-typescale-label-medium-size: 0.75rem;
            --md-sys-typescale-label-medium-weight: 500;
            
            --md-sys-typescale-body-medium-font: var(--md-sys-font-family);
            --md-sys-typescale-body-medium-size: 0.875rem;
            --md-sys-typescale-body-medium-weight: 400;
            --md-sys-typescale-body-medium-line-height: 1.25rem;
        }

        /* --- Tokens de Forma (Shape) --- */
        :root {
            --md-sys-shape-corner-small: 8px;
            --md-sys-shape-corner-medium: 12px;
            --md-sys-shape-corner-large: 16px;
            --md-sys-shape-corner-extra-large: 28px;
            --md-sys-shape-corner-full: 999px;
        }

        /* --- Estilos Globales y de Base --- */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            transition: color-scheme 0.3s ease;
        }

        body {
            font-family: var(--md-sys-font-family);
            background-color: var(--md-sys-color-surface);
            color: var(--md-sys-color-on-surface);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1rem;
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        
        .hidden {
            display: none !important;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            transition: font-variation-settings 0.2s ease;
        }
        
        /* --- Estructura Principal (v10) --- */
        .app-container {
            width: 100%;
            max-width: 420px;
            background-color: var(--md-sys-color-surface-container-highest);
            border-radius: var(--md-sys-shape-corner-large);
            box-shadow: 0 4px 12px 6px rgba(0,0,0,0.2);
            transition: background-color 0.3s ease;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            max-height: 95vh;
            padding: 0;
            border: 1px solid var(--md-sys-color-surface-container);
        }
        
        .main-content {
            flex-grow: 1;
            overflow-y: auto;
            padding: 1rem 1.5rem;
            position: relative;
        }

        
        /* --- Cabecera del Calendario (v13) --- */
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            gap: 1rem;
        }
        
        .logo-container {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .logo-container h1 {
            font-family: var(--md-sys-font-family);
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--md-sys-color-on-surface);
        }
        .logo-svg {
            width: 32px;
            height: 32px;
            fill: var(--md-sys-color-primary);
        }
        
        .header-controls {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-grow: 1;
            justify-content: flex-end;
        }
        .header-nav-buttons {
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }
        #month-year-display {
            font-family: var(--md-sys-typescale-headline-small-font);
            font-size: var(--md-sys-typescale-headline-small-size);
            font-weight: var(--md-sys-typescale-headline-small-weight);
            margin: 0 auto;
            padding-bottom: 0.5rem;
        }
        
        .search-container {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }
        #search-input {
            -webkit-appearance: none;
            appearance: none;
            border: 1px solid var(--md-sys-color-outline);
            outline: none;
            background-color: var(--md-sys-color-surface-container);
            color: var(--md-sys-color-on-surface);
            border-radius: var(--md-sys-shape-corner-full);
            padding: 0.6rem 1rem 0.6rem 2.5rem;
            font-family: var(--md-sys-typescale-body-large-font);
            font-size: var(--md-sys-typescale-body-large-size);
            width: 100%;
            transition: all 0.2s ease;
            position: relative;
        }
        .search-container .material-symbols-outlined {
            position: absolute;
            left: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--md-sys-color-on-surface-variant);
        }
        .search-input-wrapper {
            position: relative;
            width: 100%;
        }
        #search-input:focus {
             box-shadow: 0 0 0 2px var(--md-sys-color-primary);
             border-color: var(--md-sys-color-primary);
        }

        /* --- Calendario Grid --- */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 0.5rem;
            text-align: center;
        }
        #calendar-days { outline: none; border-radius: var(--md-sys-shape-corner-medium); }
        .weekday {
            font-weight: var(--md-sys-typescale-label-large-weight);
            color: var(--md-sys-color-on-surface-variant);
            font-size: var(--md-sys-typescale-label-large-size);
            margin-bottom: 0.25rem;
        }
        .day {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 40px;
            border-radius: var(--md-sys-shape-corner-full);
            cursor: pointer;
            transition: background-color 0.2s ease, color 0.2s ease, box-shadow 0.2s ease, opacity 0.3s ease, border-radius 0.2s ease;
            position: relative;
            outline: none;
            background-color: transparent;
        }
        .day.filtered {
            opacity: 0.3;
            pointer-events: none;
        }

        #calendar-days:focus-visible .day.focused {
            background-color: var(--md-sys-color-primary-container);
            outline: 2px solid var(--md-sys-color-primary);
            outline-offset: 1px;
        }
        #calendar-days:focus-visible .day.selected.focused {
             outline: 2px solid var(--md-sys-color-on-primary);
             outline-offset: 1px;
        }
        .day:not(.prev-month, .next-month):hover {
            background-color: var(--md-sys-color-surface-container);
        }
        .day.prev-month, .day.next-month {
            color: var(--md-sys-color-on-surface-variant);
            opacity: 0.6;
            cursor: default;
        }
        .day.today { 
            font-weight: 700;
            color: var(--md-sys-color-secondary);
        }
        
        .day.playing {
            box-shadow: inset 0 0 0 2px var(--md-sys-color-secondary);
            color: var(--md-sys-color-secondary);
        }
        
        .day.selected {
            background-color: var(--md-sys-color-primary);
            color: var(--md-sys-color-on-primary);
            font-weight: 700;
        }
        
        .day.playing.selected {
            box-shadow: inset 0 0 0 2px var(--md-sys-color-on-primary);
        }
        
        .day.streak-start, .day.streak-mid, .day.streak-end {
            background-color: var(--md-sys-color-primary-container);
            color: var(--md-sys-color-on-primary-container);
        }
        .day.streak-start:not(.selected), .day.streak-mid:not(.selected) {
            border-top-right-radius: 0;
            border-bottom-right-radius: 0;
        }
        .day.streak-end:not(.selected), .day.streak-mid:not(.selected) {
            border-top-left-radius: 0;
            border-bottom-left-radius: 0;
        }
        
        .day.selected.streak-start, .day.selected.streak-mid, .day.selected.streak-end {
            background-color: var(--md-sys-color-primary);
            color: var(--md-sys-color-on-primary);
        }
        
        /* MEJORA V17: Indicador de audio (tilde) */
        .day.has-audio::after {
            content: 'check_circle';
            font-family: 'Material Symbols Outlined';
            font-weight: 400;
            font-size: 14px;
            position: absolute;
            bottom: 4px;
            right: 4px;
            color: var(--md-sys-color-primary);
            opacity: 0.8;
        }
        .day.selected.has-audio::after {
            color: var(--md-sys-color-on-primary);
        }
        
        /* (v14) Indicador de Nota */
        .day.has-note::before {
            content: 'notes';
            font-family: 'Material Symbols Outlined';
            font-weight: 400;
            font-size: 14px;
            position: absolute;
            top: 4px;
            right: 4px;
            color: var(--md-sys-color-secondary);
        }
        .day.selected.has-note::before {
            color: var(--md-sys-color-on-primary);
        }
        .day.playing.has-note::before {
            color: var(--md-sys-color-secondary);
        }
        /* Si tiene audio Y nota, se ajustan */
        .day.has-audio.has-note::after {
            right: 2px;
        }
         .day.has-audio.has-note::before {
            right: auto;
            left: 4px;
        }


        /* --- Componentes de MD3 (Botones) --- */
        .md-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0 1.5rem;
            height: 40px;
            border-radius: var(--md-sys-shape-corner-full);
            border: none;
            cursor: pointer;
            font-family: var(--md-sys-font-family);
            font-size: var(--md-sys-typescale-label-large-size);
            font-weight: var(--md-sys-typescale-label-large-weight);
            transition: background-color 0.2s ease, box-shadow 0.2s ease;
            position: relative;
            overflow: hidden;
            gap: 0.5rem; /* V16: Añadido gap para icono+texto */
        }
        .md-button.filled {
            background-color: var(--md-sys-color-primary);
            color: var(--md-sys-color-on-primary);
        }
        .md-button.filled:hover {
            box-shadow: 0 1px 3px 1px rgba(0,0,0,0.15), 0 1px 2px rgba(0,0,0,0.3);
        }
        
        .md-button.text {
            background-color: transparent;
            color: var(--md-sys-color-primary);
            padding: 0 0.75rem;
        }
        .md-button.text:hover {
             background-color: var(--md-sys-color-primary-container);
        }
        
        .md-button.text.speed-control {
            min-width: 64px;
            font-weight: 700;
        }
        
        .md-segmented-button-group {
            display: flex;
            border: 1px solid var(--md-sys-color-outline);
            border-radius: var(--md-sys-shape-corner-full);
            overflow: hidden;
        }
        .md-segmented-button {
            flex-grow: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            height: 40px;
            padding: 0 1rem;
            background-color: var(--md-sys-color-surface-container);
            color: var(--md-sys-color-on-surface-variant);
            border: none;
            border-left: 1px solid var(--md-sys-color-outline);
            cursor: pointer;
            font-family: var(--md-sys-font-family);
            font-weight: var(--md-sys-typescale-label-large-weight);
            font-size: var(--md-sys-typescale-label-large-size);
            transition: background-color 0.2s ease, color 0.2s ease;
        }
        .md-segmented-button:first-child {
            border-left: none;
        }
        .md-segmented-button.selected {
            background-color: var(--md-sys-color-secondary-container);
            color: var(--md-sys-color-on-secondary-container);
        }
        .md-segmented-button:focus-visible {
            outline: 2px solid var(--md-sys-color-primary);
            outline-offset: -2px;
            z-index: 1;
        }

        .md-icon-button {
            width: 40px;
            height: 40px;
            padding: 0;
            border-radius: var(--md-sys-shape-corner-full);
            background-color: transparent;
            color: var(--md-sys-color-on-surface-variant);
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .md-icon-button:hover { 
            background-color: var(--md-sys-color-surface-container);
        }
        .md-icon-button:disabled {
            color: var(--md-sys-color-on-surface-variant);
            opacity: 0.38;
            cursor: not-allowed;
            background-color: transparent;
        }
        .md-button:disabled {
            opacity: 0.38;
            cursor: not-allowed;
            box-shadow: none;
        }
        
        /* --- MEJORA V16: Sección de Controles eliminada --- */
        .controls-section {
            display: none; /* Eliminamos el botón "Seleccionar Carpeta" */
        }
        
        /* --- Layout del Player (v10) --- */
        .player-surface {
            flex-shrink: 0;
            background-color: var(--md-sys-color-surface-container);
            border-radius: 0;
            padding: 1rem 1.5rem;
            box-shadow: none;
            border-top: 1px solid var(--md-sys-color-outline);
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            transition: background-color 0.3s ease;
        }
        
        #current-track-info {
            font-family: var(--md-sys-typescale-title-medium-font);
            font-size: var(--md-sys-typescale-title-medium-size);
            font-weight: var(--md-sys-typescale-title-medium-weight);
            color: var(--md-sys-color-on-surface);
            text-align: center;
            margin: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding-bottom: 0.5rem;
        }
        
        .player {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            min-height: 40px;
            margin: 0 auto;
        }
        
        /* (v18) Player Progress Simplificado */
        .player-progress { 
            width: 100%;
            position: relative;
            height: 4px; /* V18: Reducido */
            margin: 8px 0;
            background-color: var(--md-sys-color-surface-variant);
            border-radius: var(--md-sys-shape-corner-full);
        }
        
        /* V18: Canvas Eliminado */
        
        .time-indicators {
            display: flex;
            justify-content: space-between;
            font-family: var(--md-sys-typescale-label-medium-font);
            font-weight: var(--md-sys-typescale-label-medium-weight);
            font-size: var(--md-sys-typescale-label-medium-size);
            color: var(--md-sys-color-on-surface-variant);
            padding: 0 4px;
            margin-top: 0.25rem;
        }
        
        #progress-bar {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 4px; /* V18: Reducido */
            background: transparent;
            outline: none;
            cursor: pointer;
            margin: 0;
            position: relative;
            z-index: 2;
        }
        
        #progress-bar::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            background: var(--md-sys-color-primary);
            border-radius: 50%;
            border: none;
            transition: box-shadow 0.2s ease, transform 0.2s ease;
            transform: scale(1.0);
            margin-top: -8px; /* V18: Ajuste para centrar */
        }
        
        #progress-bar.seeking::-webkit-slider-thumb {
            transform: scale(1.2);
            box-shadow: 0 0 0 8px var(--md-sys-color-primary-container);
        }
        
        #progress-bar:focus-visible::-webkit-slider-thumb {
             box-shadow: 0 0 0 8px var(--md-sys-color-primary-container);
        }
        #progress-bar::-moz-range-thumb {
            width: 20px;
            height: 20px;
            background: var(--md-sys-color-primary);
            border-radius: 50%;
            border: none;
            cursor: pointer;
            transition: box-shadow 0.2s ease, transform 0.2s ease;
            transform: scale(1.0);
        }
        
        #progress-bar.seeking::-moz-range-thumb {
            transform: scale(1.2);
            box-shadow: 0 0 0 8px var(--md-sys-color-primary-container);
        }
        
        #progress-bar:focus-visible::-moz-range-thumb {
             box-shadow: 0 0 0 8px var(--md-sys-color-primary-container);
        }
         #progress-bar::-moz-range-track {
            width: 100%;
            height: 4px;
            background: transparent;
        }
        #progress-bar::-moz-range-progress {
            background-color: var(--md-sys-color-primary); /* V18: Añadido para Firefox */
            height: 4px;
            border-radius: var(--md-sys-shape-corner-full);
        }

        /* V18: Estilo para la barra de progreso (track) */
        #progress-bar::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            width: var(--progress-percent, 0%);
            height: 100%;
            background-color: var(--md-sys-color-primary);
            border-radius: var(--md-sys-shape-corner-full);
            z-index: -1;
            pointer-events: none;
        }
        
        /* --- Indicador de Progreso Lineal (v5) --- */
        @keyframes indeterminate-progress {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(400%); }
        }
        
        #loading-indicator {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background-color: var(--md-sys-color-surface-variant);
            overflow: hidden;
            visibility: hidden;
            z-index: 10;
        }
        
        #loading-indicator.visible {
            visibility: visible;
        }
        
        #loading-indicator .progress-bar {
            width: 100%;
            height: 100%;
            background-color: var(--md-sys-color-primary);
            animation: indeterminate-progress 2s infinite linear;
        }
        
        /* --- Estilos del Dialog (v15) --- */
        .dialog-scrim {
            position: fixed;
            inset: 0;
            background-color: var(--md-sys-color-scrim);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease, backdrop-filter 0.3s ease;
        }
        
        .dialog-scrim.visible {
            opacity: 0.6; 
            visibility: visible;
            backdrop-filter: blur(6px); 
        }

        .md-dialog {
            background-color: var(--md-sys-color-surface-container-low);
            border-radius: var(--md-sys-shape-corner-extra-large);
            padding: 1.5rem;
            width: calc(100% - 3rem);
            max-width: 560px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.25);
            color: var(--md-sys-color-on-surface);
            transform: scale(0.9);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s cubic-bezier(0.05, 0.7, 0.1, 1.0);
            z-index: 101;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
        }
        
        .dialog-scrim.visible .md-dialog {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
            visibility: visible;
        }

        .dialog-title {
            font-family: var(--md-sys-typescale-headline-small-font);
            font-size: var(--md-sys-typescale-headline-small-size);
            font-weight: var(--md-sys-typescale-headline-small-weight);
            margin-bottom: 1rem;
        }
        
        .dialog-list {
            list-style: none;
            margin: 0 -1rem;
            max-height: 40vh;
            overflow-y: auto;
        }
        
        .dialog-list-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.75rem 1rem;
            border-radius: var(--md-sys-shape-corner-full);
            cursor: pointer;
            transition: background-color 0.2s ease;
            outline: none;
        }
        
        /* MEJORA V17: Estilo para el estado vacío del dialog */
        .dialog-list-item.empty-state {
            pointer-events: none;
            color: var(--md-sys-color-on-surface-variant);
            justify-content: center;
            font-style: italic;
        }
        
        .dialog-list-item:focus {
            background-color: var(--md-sys-color-surface-container-highest);
            outline: 2px solid var(--md-sys-color-primary);
            outline-offset: -2px;
        }
        
        .dialog-list-item:not(.empty-state):hover {
            background-color: var(--md-sys-color-surface-container-highest);
        }

        .dialog-list-item.playing {
            background-color: var(--md-sys-color-secondary-container);
        }
        .dialog-list-item.playing .material-symbols-outlined {
            color: var(--md-sys-color-on-secondary-container);
        }
        .dialog-list-item.playing span {
            color: var(--md-sys-color-on-secondary-container);
            font-weight: var(--md-sys-typescale-label-large-weight);
        }
        
        .dialog-list-item .material-symbols-outlined {
            color: var(--md-sys-color-secondary);
        }
        
        .dialog-list-item span {
            font-family: var(--md-sys-typescale-title-medium-font);
            font-size: var(--md-sys-typescale-title-medium-size);
            font-weight: var(--md-sys-typescale-title-medium-weight);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .dialog-actions {
            display: flex;
            justify-content: space-between; /* MEJORA V16: Ajustado */
            gap: 0.5rem;
            margin-top: 1.5rem;
        }
        
        /* (v7) Estilos del Snackbar */
        .snackbar {
            position: fixed;
            bottom: 1.5rem;
            left: 50%;
            transform: translate(-50%, 150%);
            min-width: 288px;
            max-width: calc(100% - 3rem);
            padding: 1rem;
            background-color: var(--md-sys-color-inverse-surface);
            color: var(--md-sys-color-inverse-on-surface);
            border-radius: var(--md-sys-shape-corner-small);
            box-shadow: 0 4px 8px 3px rgba(0,0,0,0.15), 0 1px 3px rgba(0,0,0,0.3);
            font-family: var(--md-sys-font-family);
            font-size: var(--md-sys-typescale-body-large-size);
            z-index: 200;
            opacity: 0;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }
        
        .snackbar.visible {
            transform: translate(-50%, 0);
            opacity: 1;
        }
        
        .snackbar.error {
            background-color: var(--md-sys-color-error-container);
            color: var(--md-sys-color-on-error-container);
        }

        /* (v11) Estilos del Dialog de Ajustes */
        .settings-section {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }
        .settings-section-title {
            font-family: var(--md-sys-typescale-title-small-font);
            font-weight: var(--md-sys-typescale-title-small-weight);
            font-size: var(--md-sys-typescale-title-small-size);
            color: var(--md-sys-color-primary);
            margin-bottom: 0.25rem;
        }
        
        /* (v14) Dialog de Nota */
        #note-textarea {
            width: 100%;
            min-height: 150px;
            background-color: var(--md-sys-color-surface-container);
            color: var(--md-sys-color-on-surface);
            border: 1px solid var(--md-sys-color-outline);
            border-radius: var(--md-sys-shape-corner-medium);
            padding: 1rem;
            font-family: var(--md-sys-typescale-body-medium-font);
            font-size: var(--md-sys-typescale-body-medium-size);
            line-height: var(--md-sys-typescale-body-medium-line-height);
            resize: vertical;
            outline: none;
        }
        #note-textarea:focus {
            border-color: var(--md-sys-color-primary);
            box-shadow: 0 0 0 1px var(--md-sys-color-primary);
        }
        
    </style>
</head>
<body>

    <!-- (v10) Estructura de Layout -->
    <main class="app-container">

                        <path d="M15 35H85" stroke="currentColor" stroke-width="8"/>

        </div>
        
        <!-- Reproductor (Bottom Bar Fija) -->
        <div class="player-surface">

    </main>
    
    <audio id="audio-player" crossOrigin="anonymous"></audio>
    
    <!-- MEJORA V17: Input de archivo clásico, oculto -->

    <!-- Dialog de Audios (v10) -->
    <div class="dialog-scrim" id="dialog-scrim">

    <!-- (v11) Dialog de Ajustes -->
