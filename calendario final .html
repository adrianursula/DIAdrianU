    <!-- (v7) Snackbar para notificaciones -->
    <div id="snackbar" class="snackbar" role="status"></div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- STATE MANAGEMENT ---
            let currentDate = new Date();
            let focusedDate = new Date(); 
            let audioFiles = {}; // MEJORA V17: Almacena objetos { name, type, data: ArrayBuffer }
            let journalNotes = {}; 
            let selectedDateElement = null;
            let currentAudioURL = null;
            const audioExtensions = ['.mp3', '.wav', '.ogg', '.m4a'];
            let isSeeking = false;
            
            let currentPlaylist = [];
            let currentPlaylistIndex = 0;
            let playingDateElement = null;
            let snackbarTimeout = null;
            let elementFocusedBeforeDialog = null;
            let lastTimeUpdateSave = 0;
            
            // V18: Estado del visualizador eliminado
            
            const playbackSpeeds = [1.0, 1.5, 2.0, 0.5];
            let currentSpeedIndex = 0;

            // --- DOM ELEMENTS ---
            const docElement = document.documentElement;
            const mainContent = document.getElementById('main-content');
            const monthYearDisplay = document.getElementById('month-year-display');
            const calendarDays = document.getElementById('calendar-days');
            const weekdaysContainer = document.getElementById('weekdays');
            const prevMonthBtn = document.getElementById('prev-month-btn');
            const nextMonthBtn = document.getElementById('next-month-btn');
            const todayBtn = document.getElementById('today-btn');
            const settingsBtn = document.getElementById('settings-btn');
            const noteBtn = document.getElementById('note-btn');
            
            const manualFileInput = document.getElementById('manual-file-input'); // V17
            
            const playPauseBtn = document.getElementById('play-pause-btn');
            const playPauseIcon = document.getElementById('play-pause-icon');
            const currentTrackInfo = document.getElementById('current-track-info');
            const audioPlayer = document.getElementById('audio-player');
            
            const prevTrackBtn = document.getElementById('prev-track-btn');
            const nextTrackBtn = document.getElementById('next-track-btn');
            const playbackSpeedBtn = document.getElementById('playback-speed-btn');
            
            const progressBar = document.getElementById('progress-bar');
            const currentTimeDisplay = document.getElementById('current-time');
            const totalTimeDisplay = document.getElementById('total-time');
            
            const loadingIndicator = document.getElementById('loading-indicator');
            const snackbar = document.getElementById('snackbar');

            // Dialog de Audio
            const dialogScrim = document.getElementById('dialog-scrim');
            const audioDialog = document.getElementById('audio-dialog');
            const dialogTitle = document.getElementById('dialog-title');
            const dialogList = document.getElementById('dialog-list');
            const dialogCancelBtn = document.getElementById('dialog-cancel-btn');
            const dialogAddAudioBtn = document.getElementById('dialog-add-audio-btn'); // V16
            
            // Dialog de Ajustes
            const settingsScrim = document.getElementById('settings-scrim');
            const settingsDialog = document.getElementById('settings-dialog');
            const settingsCloseBtn = document.getElementById('settings-close-btn');
            const themeSystemBtn = document.getElementById('theme-system-btn');
            const themeLightBtn = document.getElementById('theme-light-btn');
            const themeDarkBtn = document.getElementById('theme-dark-btn');
            const themeButtons = [themeSystemBtn, themeLightBtn, themeDarkBtn];
            
            // Dialog de Nota
            const noteScrim = document.getElementById('note-scrim');
            const noteDialog = document.getElementById('note-dialog');
            const noteDialogTitle = document.getElementById('note-dialog-title');
            const noteTextarea = document.getElementById('note-textarea');
            const noteSaveBtn = document.getElementById('note-save-btn');
            const noteCancelBtn = document.getElementById('note-cancel-btn');
            
            const searchInput = document.getElementById('search-input');
            
            // V18: Elementos del visualizador eliminados

            
            // --- Lógica de IndexedDB (Actualizada V17.1) ---
            const DB_NAME = 'AudioCalendarDB_v17_1'; // V17.1
            const STORES = {
                SETTINGS: 'Settings',
                PLAYBACK: 'Playback',
                NOTES: 'Notes',
                AUDIO_MAP: 'AudioMap' // Almacena { name, type, data: ArrayBuffer }
            };
            const DB_VERSION = 1;

            const openDB = () => {
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open(DB_NAME, DB_VERSION);
                    request.onerror = (event) => reject('Error al abrir IndexedDB');
                    request.onsuccess = (event) => resolve(event.target.result);
                    request.onupgradeneeded = (event) => {
                        const db = event.target.result;
                        if (!db.objectStoreNames.contains(STORES.SETTINGS)) {
                            db.createObjectStore(STORES.SETTINGS);
                        }
                        if (!db.objectStoreNames.contains(STORES.PLAYBACK)) {
                            db.createObjectStore(STORES.PLAYBACK);
                        }
                        if (!db.objectStoreNames.contains(STORES.NOTES)) {
                            db.createObjectStore(STORES.NOTES);
                        }
                        if (!db.objectStoreNames.contains(STORES.AUDIO_MAP)) { 
                            db.createObjectStore(STORES.AUDIO_MAP);
                        }
                    };
                });
            };

            const dbGet = (storeName, key) => {
                return openDB().then(db => {
                    return new Promise((resolve, reject) => {
                        const transaction = db.transaction(storeName, 'readonly');
                        const store = transaction.objectStore(storeName);
                        const request = store.get(key);
                        request.onsuccess = () => resolve(request.result);
                        request.onerror = () => reject(request.error);
                    });
                });
            };
            
            const dbGetAllKeys = (storeName) => {
                return openDB().then(db => {
                    return new Promise((resolve, reject) => {
                        const transaction = db.transaction(storeName, 'readonly');
                        const store = transaction.objectStore(storeName);
                        const request = store.getAllKeys();
                        request.onsuccess = () => resolve(request.result);
                        request.onerror = () => reject(request.error);
                    });
                });
            };

            const dbSet = (storeName, key, value) => {
                return openDB().then(db => {
                    return new Promise((resolve, reject) => {
                        const transaction = db.transaction(storeName, 'readwrite');
                        const store = transaction.objectStore(storeName);
                        const request = store.put(value, key);
                        request.onsuccess = () => resolve(request.result);
                        request.onerror = () => reject(request.error);
                    });
                });
            };
            
            // --- Lógica de UI y Servicios ---

            const showSnackbar = (message, isError = false) => {
                clearTimeout(snackbarTimeout);
                snackbar.textContent = message;
                snackbar.classList.toggle('error', isError);
                snackbar.classList.add('visible');
                snackbarTimeout = setTimeout(() => {
                    snackbar.classList.remove('visible');
                }, 3000);
            };

            // --- MEJORA V17.1: Lógica de carga de archivos ---
            
            const loadAudioMap = async () => {
                try {
                    audioFiles = await dbGet(STORES.AUDIO_MAP, 'mainMap') || {};
                    console.log('Mapa de audios cargado desde IDB:', audioFiles);
                } catch (e) {
                    console.error('Error al cargar mapa de audios:', e);
                    audioFiles = {};
                }
            };
            
            const saveAudioMap = async () => {
                try {
                    await dbSet(STORES.AUDIO_MAP, 'mainMap', audioFiles);
                    console.log('Mapa de audios guardado en IDB.');
                } catch (e) {
                    console.error('Error al guardar mapa de audios:', e);
                    showSnackbar('Error al guardar la asociación de audios.', true);
                }
            };

            // V17: Se activa con el click en el botón
            const handleAddAudioClick = () => {
                manualFileInput.click(); // Dispara el input oculto
            };
            
            // V17.1: Corregido el almacenamiento a ArrayBuffer
            const handleManualFileSelect = async (event) => {
                const dateStr = audioDialog.dataset.currentDate;
                if (!dateStr) return;
                
                const files = event.target.files;
                if (!files || files.length === 0) return;

                loadingIndicator.classList.add('visible'); // Show loader
                showSnackbar(`Procesando ${files.length} archivo(s)...`);

                if (!audioFiles[dateStr]) {
                    audioFiles[dateStr] = [];
                }
                
                const existingNames = audioFiles[dateStr].map(f => f.name);
                const newFiles = Array.from(files).filter(f => !existingNames.includes(f.name));
                
                let filesAddedCount = 0;
                for (const file of newFiles) {
                    try {
                        // V17.1: Convertir a ArrayBuffer para almacenamiento robusto
                        const arrayBuffer = await file.arrayBuffer();
                        const audioData = {
                            name: file.name,
                            type: file.type,
                            data: arrayBuffer // Guardamos el buffer, no el File
                        };
                        audioFiles[dateStr].push(audioData);
                        filesAddedCount++;
                    } catch (err) {
                        console.error(`Error procesando ${file.name}:`, err);
                        showSnackbar(`Error al leer ${file.name}`, true);
                    }
                }
                
                if (filesAddedCount > 0) {
                    await saveAudioMap();
                    renderCalendar(); // Actualizar indicador del día
                }
                
                // Refrescar el diálogo
                showAudioDialog(dateStr);
                loadingIndicator.classList.remove('visible'); // Hide loader
                showSnackbar(`${filesAddedCount} audio(s) añadido(s) al día ${dateStr}.`);
                
                manualFileInput.value = '';
            };
            
            // --- (V11) Lógica de Ajustes (Tema) ---
            
            const applyThemeMode = (mode) => {
                docElement.setAttribute('data-theme', mode);
                themeButtons.forEach(button => {
                    button.classList.toggle('selected', button.dataset.themeMode === mode);
                });
            };

            const openSettingsDialog = () => {
                elementFocusedBeforeDialog = document.activeElement;
                settingsScrim.classList.add('visible');
            };
            
            const closeSettingsDialog = () => {
                settingsScrim.classList.remove('visible');
                if (elementFocusedBeforeDialog) {
                    elementFocusedBeforeDialog.focus();
                }
            };
            
            const initializeSettings = async () => {
                const savedMode = await dbGet(STORES.SETTINGS, 'themeMode') || 'system';
                applyThemeMode(savedMode);
            };
            
            // --- V18: Lógica del Visualizador eliminada ---
            
            // --- (V12) Lógica de Búsqueda ---
            
            const filterCalendar = (searchTerm) => {
                const lowerTerm = searchTerm.toLowerCase().trim();
                const allDays = calendarDays.querySelectorAll('.day[data-date]');
                
                if (lowerTerm === '') {
                    allDays.forEach(day => day.classList.remove('filtered'));
                    return;
                }
                
                allDays.forEach(day => {
                    const dateStr = day.dataset.date;
                    const files = audioFiles[dateStr];
                    const note = journalNotes[dateStr]; 
                    
                    let hasMatch = false;
                    
                    if (files && files.length > 0) {
                        hasMatch = files.some(file => // V17.1: file.name sigue funcionando
                            getCleanFileName(file.name).toLowerCase().includes(lowerTerm)
                        );
                    }
                    
                    if (!hasMatch && note) { 
                        hasMatch = note.toLowerCase().includes(lowerTerm);
                    }
                    
                    day.classList.toggle('filtered', !hasMatch);
                });
            };
            
            // --- (V14) Lógica de Notas ---
            
            const loadAllNotes = async () => {
                try {
                    const keys = await dbGetAllKeys(STORES.NOTES);
                    journalNotes = {};
                    keys.forEach(key => journalNotes[key] = true); 
                } catch (e) {
                    console.error("Error al cargar llaves de notas", e);
                }
            };
            
            const openNoteDialog = async () => {
                const dateStr = selectedDateElement.dataset.date;
                noteDialogTitle.textContent = `Nota del ${dateStr}`;
                
                try {
                    const noteText = await dbGet(STORES.NOTES, dateStr);
                    noteTextarea.value = noteText || '';
                } catch (e) {
                    noteTextarea.value = '';
                }
                
                elementFocusedBeforeDialog = document.activeElement;
                noteScrim.classList.add('visible');
                noteTextarea.focus();
            };
            
            const closeNoteDialog = () => {
                noteScrim.classList.remove('visible');
                if (elementFocusedBeforeDialog) {
                    elementFocusedBeforeDialog.focus();
                }
            };
            
            const saveNote = async () => {
                const dateStr = selectedDateElement.dataset.date;
                const noteText = noteTextarea.value;
                try {
                    await dbSet(STORES.NOTES, dateStr, noteText);
                    if (noteText) {
                        journalNotes[dateStr] = true;
                    } else {
                        delete journalNotes[dateStr];
                    }
                    selectedDateElement.classList.toggle('has-note', !!noteText);
                    showSnackbar('Nota guardada.');
                    closeNoteDialog();
                } catch (e) {
                    showSnackbar('Error al guardar la nota.', true);
                }
            };

            // --- CORE FUNCTIONS (Actualizadas) ---
            
            const formatTime = (seconds) => {
                if (isNaN(seconds) || seconds === 0) return '0:00';
                const minutes = Math.floor(seconds / 60);
                const secs = Math.floor(seconds % 60);
                return `${minutes}:${String(secs).padStart(2, '0')}`;
            };
            
            const formatDate = (date) => {
                const y = date.getFullYear();
                const m = String(date.getMonth() + 1).padStart(2, '0');
                const d = String(date.getDate()).padStart(2, '0');
                return `${y}-${m}-${d}`;
            };
            
            const getCleanFileName = (fileName) => {
                let cleanName = fileName;
                const lastDotIndex = cleanName.lastIndexOf('.');
                if (lastDotIndex > 0) {
                    cleanName = cleanName.substring(0, lastDotIndex);
                }
                return cleanName || "Audio sin nombre";
            };
            
            const updateFocus = () => {
                const prevFocused = calendarDays.querySelector('.day.focused');
                if (prevFocused) prevFocused.classList.remove('focused');
                const dateStr = formatDate(focusedDate);
                const dayToFocus = calendarDays.querySelector(`.day[data-date="${dateStr}"]`);
                if (dayToFocus) dayToFocus.classList.add('focused');
            };
            
            const renderCalendar = () => {
                calendarDays.innerHTML = '';
                const year = currentDate.getFullYear();
                const month = currentDate.getMonth();

                monthYearDisplay.textContent = new Intl.DateTimeFormat('es-ES', { month: 'long', year: 'numeric' }).format(currentDate);

                const firstDayOfMonth = new Date(year, month, 1).getDay();
                const adjustedFirstDay = (firstDayOfMonth === 0) ? 6 : firstDayOfMonth - 1; 
                const lastDateOfMonth = new Date(year, month + 1, 0).getDate();
                const lastDateOfPrevMonth = new Date(year, month, 0).getDate();

                for (let i = adjustedFirstDay; i > 0; i--) {
                    const dayElement = document.createElement('div');
                    dayElement.classList.add('day', 'prev-month');
                    dayElement.textContent = lastDateOfPrevMonth - i + 1;
                    calendarDays.appendChild(dayElement);
                }

                for (let i = 1; i <= lastDateOfMonth; i++) {
                    const dayElement = document.createElement('div');
                    dayElement.classList.add('day');
                    dayElement.textContent = i;
                    
                    const date = new Date(year, month, i);
                    const dateStr = formatDate(date);
                    dayElement.dataset.date = dateStr;
                    dayElement.setAttribute('tabindex', '-1'); 

                    const today = new Date();
                    if (i === today.getDate() && year === today.getFullYear() && month === today.getMonth()) {
                        dayElement.classList.add('today');
                    }
                    
                    if (journalNotes[dateStr]) {
                        dayElement.classList.add('has-note');
                    }
                    
                    const hasAudio = audioFiles[dateStr] && audioFiles[dateStr].length > 0;
                    if (hasAudio) {
                        dayElement.classList.add('has-audio');
                        
                        const prevDateStr = formatDate(new Date(year, month, i - 1));
                        const nextDateStr = formatDate(new Date(year, month, i + 1));
                        const hasPrevAudio = audioFiles[prevDateStr] && audioFiles[prevDateStr].length > 0;
                        const hasNextAudio = audioFiles[nextDateStr] && audioFiles[nextDateStr].length > 0;

                        if (hasPrevAudio && hasNextAudio) {
                            dayElement.classList.add('streak-mid');
                        } else if (hasPrevAudio) {
                            dayElement.classList.add('streak-end');
                        } else if (hasNextAudio) {
                            dayElement.classList.add('streak-start');
                        }
                    }
                    
                    dayElement.addEventListener('click', () => handleDayClick(dayElement, dateStr));
                    calendarDays.appendChild(dayElement);
                }

                const totalDaysRendered = calendarDays.children.length;
                const nextDays = 42 - totalDaysRendered; 
                for (let i = 1; i <= nextDays; i++) {
                    const dayElement = document.createElement('div');
                    dayElement.classList.add('day', 'next-month');
                    dayElement.textContent = i;
                    calendarDays.appendChild(dayElement);
                }
                
                if (playingDateElement) {
                    const playingDateStr = playingDateElement.dataset.date;
                    const newPlayingEl = calendarDays.querySelector(`.day[data-date="${playingDateStr}"]`);
                    if (newPlayingEl) {
                        playingDateElement = newPlayingEl;
                        playingDateElement.classList.add('playing');
                    } else {
                        playingDateElement = null;
                    }
                }

                updateFocus();
                
                if (searchInput.value) {
                    filterCalendar(searchInput.value);
                }
            };
            
            const renderWeekdays = () => {
                const weekdays = ['L', 'M', 'X', 'J', 'V', 'S', 'D'];
                weekdaysContainer.innerHTML = '';
                weekdays.forEach(day => {
                    const weekdayEl = document.createElement('div');
                    weekdayEl.classList.add('weekday');
                    weekdayEl.textContent = day;
                    weekdaysContainer.appendChild(weekdayEl);
                });
            };
            
            const resetPlayer = (notify = false, message = 'Selecciona un día') => {
                audioPlayer.pause();
                audioPlayer.src = '';
                if(currentAudioURL) URL.revokeObjectURL(currentAudioURL);
                currentAudioURL = null;
                
                playPauseBtn.disabled = true;
                playPauseIcon.textContent = 'play_arrow';
                prevTrackBtn.disabled = true;
                nextTrackBtn.disabled = true;
                playbackSpeedBtn.disabled = true;
                
                currentTrackInfo.textContent = 'Selecciona un día';
                
                progressBar.value = 0;
                progressBar.disabled = true;
                progressBar.style.setProperty('--progress-percent', '0%'); // V18
                currentTimeDisplay.textContent = '0:00';
                totalTimeDisplay.textContent = '0:00';
                
                currentPlaylist = [];
                currentPlaylistIndex = 0;
                
                clearPlayingIndicator();
                
                dbSet(STORES.PLAYBACK, 'lastPosition', null);
                
                if (notify) {
                    showSnackbar(message);
                }
                
                // V18: Visualizador eliminado
            };
            
            // --- Lógica del Dialog (Actualizada V17.1) ---
            
            const handleDialogKeyNavigation = (e) => {
                const focusableElements = Array.from(
                    audioDialog.querySelectorAll('.dialog-list-item:not(.empty-state), .md-button')
                );
                if (focusableElements.length === 0) return;

                const currentIndex = focusableElements.indexOf(document.activeElement);
                let nextIndex = -1;
                
                if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    nextIndex = (currentIndex + 1) % focusableElements.length;
                } else if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    nextIndex = (currentIndex - 1 + focusableElements.length) % focusableElements.length;
                } else if (e.key === 'Escape') {
                    hideAudioDialog();
                }

                if (nextIndex !== -1) {
                    focusableElements[nextIndex].focus();
                }
            };
            
            const handleScrimClick = (e) => {
                if (e.target === dialogScrim) {
                    hideAudioDialog();
                }
            };
            
            const showAudioDialog = (dateStr) => {
                dialogTitle.textContent = `Audios del ${dateStr}`;
                audioDialog.dataset.currentDate = dateStr; 
                dialogList.innerHTML = '';
                elementFocusedBeforeDialog = document.activeElement;
                
                const audioDataList = audioFiles[dateStr]; // V17.1
                
                if (audioDataList && audioDataList.length > 0) {
                    audioDataList.forEach((audioData, index) => { // V17.1: 'audioData'
                        const listItem = document.createElement('li');
                        listItem.classList.add('dialog-list-item');
                        listItem.setAttribute('role', 'option');
                        listItem.setAttribute('tabindex', '-1');
                        
                        const icon = document.createElement('span');
                        icon.classList.add('material-symbols-outlined');
                        icon.textContent = 'audio_file';
                        
                        const name = document.createElement('span');
                        name.textContent = getCleanFileName(audioData.name);
                        
                        listItem.appendChild(icon);
                        listItem.appendChild(name);
                        
                        const isPlayingThisTrack = playingDateElement && 
                                                 playingDateElement.dataset.date === dateStr && 
                                                 currentPlaylist[currentPlaylistIndex] === audioData;
                                                 
                        if (isPlayingThisTrack) {
                            listItem.classList.add('playing');
                            icon.textContent = 'volume_up';
                        }
                        
                        listItem.addEventListener('click', () => {
                            startPlaylist(audioDataList, index);
                            hideAudioDialog();
                        });
                        
                        listItem.addEventListener('keydown', (e) => {
                            if (e.key === 'Enter' || e.key === ' ') {
                                e.preventDefault();
                                startPlaylist(audioDataList, index);
                                hideAudioDialog();
                            }
                        });
                        
                        dialogList.appendChild(listItem);
                    });
                } else {
                    dialogList.innerHTML = '<li class="dialog-list-item empty-state">No hay audios para este día.</li>';
                }
                
                dialogScrim.classList.add('visible');
                
                const firstItem = dialogList.querySelector('.dialog-list-item:not(.empty-state)');
                if (firstItem) {
                    firstItem.setAttribute('tabindex', '0');
                    firstItem.focus();
                } else {
                    dialogAddAudioBtn.focus();
                }

                audioDialog.addEventListener('keydown', handleDialogKeyNavigation);
                dialogCancelBtn.addEventListener('click', hideAudioDialog, { once: true });
                dialogScrim.addEventListener('click', handleScrimClick, { once: true });
            };
            
            const hideAudioDialog = () => {
                audioDialog.removeEventListener('keydown', handleDialogKeyNavigation);
                dialogScrim.removeEventListener('click', handleScrimClick);
                dialogScrim.classList.remove('visible');
                
                if (elementFocusedBeforeDialog) {
                    elementFocusedBeforeDialog.focus();
                    elementFocusedBeforeDialog = null;
                }
            };
            
            // --- Lógica de Reproducción (Actualizada V17.1 / V18) ---
            
            const clearPlayingIndicator = () => {
                if (playingDateElement) {
                    playingDateElement.classList.remove('playing');
                    playingDateElement = null;
                }
            };
            
            const startPlaylist = (audioDataList, startIndex) => { // V17.1
                currentPlaylist = audioDataList;
                currentPlaylistIndex = startIndex;
                
                clearPlayingIndicator();
                if (selectedDateElement) {
                    playingDateElement = selectedDateElement;
                    playingDateElement.classList.add('playing');
                }
                
                playAudio(currentPlaylist[currentPlaylistIndex]);
            };

            const updatePlaylistControls = () => {
                prevTrackBtn.disabled = (currentPlaylistIndex === 0);
                nextTrackBtn.disabled = (currentPlaylistIndex === currentPlaylist.length - 1);
            };
            
            // V18: Eliminada getAudioTags
            
            // V17.1: Acepta 'audioData' y reconstruye el File/Blob
            // V17.2: Añadido autoplay
            // V18: Eliminado getAudioTags
            const loadAudio = async (audioData, startTime = 0, autoplay = false) => {
                try {
                    // V17.1: Reconstruir el Blob/File desde el ArrayBuffer
                    const audioBlob = new Blob([audioData.data], { type: audioData.type });

                    if (currentAudioURL) {
                        URL.revokeObjectURL(currentAudioURL);
                    }
                    currentAudioURL = URL.createObjectURL(audioBlob); // Usar el Blob para playback
                    audioPlayer.src = currentAudioURL;
                    audioPlayer.playbackRate = playbackSpeeds[currentSpeedIndex];
                    
                    audioPlayer.addEventListener('loadedmetadata', () => {
                        if (startTime > 0 && startTime < audioPlayer.duration) {
                            audioPlayer.currentTime = startTime;
                        }
                        totalTimeDisplay.textContent = formatTime(audioPlayer.duration);
                        progressBar.max = audioPlayer.duration;

                        // V17.2: Mover el play() aquí
                        if (autoplay) {
                            audioPlayer.play();
                        }
                    }, { once: true });
                    
                    // V18: Eliminado getAudioTags
                    currentTrackInfo.textContent = getCleanFileName(audioData.name);
                    
                    progressBar.disabled = false;
                    playPauseBtn.disabled = false;
                    playbackSpeedBtn.disabled = false;
                    
                    updatePlaylistControls();
                    
                } catch (err) {
                     console.error('Error al cargar el archivo:', err);
                     showSnackbar('Error al cargar audio.', true);
                     resetPlayer();
                }
            };

            const playAudio = async (audioData) => { // V17.1
                await loadAudio(audioData, 0, true); // V17.2: Pasar autoplay=true
            };
            
            const savePlaybackPosition = () => {
                if (audioPlayer.currentTime > 0 && currentPlaylist.length > 0) {
                    const currentAudio = currentPlaylist[currentPlaylistIndex]; // V17.1
                    const position = {
                        fileName: currentAudio.name, // V17.1
                        time: audioPlayer.currentTime,
                        dateStr: playingDateElement ? playingDateElement.dataset.date : null
                    };
                    dbSet(STORES.PLAYBACK, 'lastPosition', position);
                }
            };
            
            const loadPlaybackPosition = async () => {
                const position = await dbGet(STORES.PLAYBACK, 'lastPosition');
                if (!position || !position.fileName) return;

                let foundAudio = null; // V17.1
                let foundDateStr = null;

                if (position.dateStr && audioFiles[position.dateStr]) {
                    foundAudio = audioFiles[position.dateStr].find(f => f.name === position.fileName); // V17.1
                    if (foundAudio) foundDateStr = position.dateStr;
                }

                if (!foundAudio) {
                    for (const [dateStr, audios] of Object.entries(audioFiles)) { // V17.1
                        foundAudio = audios.find(f => f.name === position.fileName); // V17.1
                        if (foundAudio) {
                            foundDateStr = dateStr;
                            break;
                        }
                    }
                }

                if (foundAudio) {
                    currentPlaylist = audioFiles[foundDateStr];
                    currentPlaylistIndex = currentPlaylist.indexOf(foundAudio);
                    
                    const dayEl = calendarDays.querySelector(`.day[data-date="${foundDateStr}"]`);
                    if (dayEl) {
                        playingDateElement = dayEl;
                        playingDateElement.classList.add('playing');
                    }
                    
                    await loadAudio(foundAudio, position.time);
                    showSnackbar(`Cargado: ${getCleanFileName(position.fileName)} en ${formatTime(position.time)}`);
                } else {
                    dbSet(STORES.PLAYBACK, 'lastPosition', null);
                }
            };


            const handleDayClick = async (element, dateStr) => {
                if (selectedDateElement) {
                    selectedDateElement.classList.remove('selected');
                }
                selectedDateElement = element;
                selectedDateElement.classList.add('selected');
                
                noteBtn.disabled = false; 
                
                focusedDate = new Date(dateStr + 'T12:00:00');
                updateFocus();
                calendarDays.focus();

                showAudioDialog(dateStr);
            };
            
            const handleKeyNavigation = (e) => {
                if (document.activeElement === searchInput || 
                    dialogScrim.classList.contains('visible') || 
                    settingsScrim.classList.contains('visible') ||
                    noteScrim.classList.contains('visible') 
                ) {
                    return;
                }
                
                let newFocusedDate = new Date(focusedDate);
                switch (e.key) {
                    case 'ArrowRight': newFocusedDate.setDate(newFocusedDate.getDate() + 1); break;
                    case 'ArrowLeft': newFocusedDate.setDate(newFocusedDate.getDate() - 1); break;
                    case 'ArrowUp': newFocusedDate.setDate(newFocusedDate.getDate() - 7); break;
                    case 'ArrowDown': newFocusedDate.setDate(newFocusedDate.getDate() + 7); break;
                    case 'Enter':
                    case ' ':
                        e.preventDefault();
                        const dateStr = formatDate(focusedDate);
                        const el = calendarDays.querySelector(`.day[data-date="${dateStr}"]`);
                        if (el) el.click();
                        return;
                    case 'Escape':
                         return;
                    default: return;
                }
                e.preventDefault();
                if (newFocusedDate.getMonth() !== focusedDate.getMonth()) {
                    currentDate = new Date(newFocusedDate);
                    focusedDate = newFocusedDate;
                    renderCalendar();
                } else {
                    focusedDate = newFocusedDate;
                    updateFocus();
                }
            };

            // --- EVENT LISTENERS ---
            prevMonthBtn.addEventListener('click', () => {
                currentDate.setMonth(currentDate.getMonth() - 1);
                focusedDate.setMonth(focusedDate.getMonth() - 1);
                renderCalendar();
            });
            nextMonthBtn.addEventListener('click', () => {
                currentDate.setMonth(currentDate.getMonth() + 1);
                focusedDate.setMonth(focusedDate.getMonth() + 1);
                renderCalendar();
            });
            
            todayBtn.addEventListener('click', () => {
                const today = new Date();
                currentDate = new Date(today.getFullYear(), today.getMonth(), 1); 
                focusedDate = today; 
                renderCalendar();
                
                const todayEl = calendarDays.querySelector('.day.today');
                if (todayEl) {
                    requestAnimationFrame(() => {
                        todayEl.click();
                    });
                }
            });
            
            manualFileInput.addEventListener('change', handleManualFileSelect); // V17
            
            document.addEventListener('keydown', handleKeyNavigation); 

            playPauseBtn.addEventListener('click', () => {
                // V18: Eliminada la lógica de AudioContext
                if (audioPlayer.paused) audioPlayer.play();
                else audioPlayer.pause();
            });
            
            prevTrackBtn.addEventListener('click', () => {
                if (currentPlaylistIndex > 0) {
                    currentPlaylistIndex--;
                    playAudio(currentPlaylist[currentPlaylistIndex]);
                }
            });
            
            nextTrackBtn.addEventListener('click', () => {
                if (currentPlaylistIndex < currentPlaylist.length - 1) {
                    currentPlaylistIndex++;
                    playAudio(currentPlaylist[currentPlaylistIndex]);
                }
            });
            
            playbackSpeedBtn.addEventListener('click', () => {
                currentSpeedIndex = (currentSpeedIndex + 1) % playbackSpeeds.length;
                const newSpeed = playbackSpeeds[currentSpeedIndex];
                audioPlayer.playbackRate = newSpeed;
                playbackSpeedBtn.textContent = newSpeed.toFixed(1) + 'x';
            });
            
            audioPlayer.addEventListener('play', () => { 
                playPauseIcon.textContent = 'pause';
                // V18: Visualizador eliminado
            });
            audioPlayer.addEventListener('pause', () => { 
                playPauseIcon.textContent = 'play_arrow'; 
                savePlaybackPosition();
                // V18: Visualizador eliminado
            });
            
            audioPlayer.addEventListener('timeupdate', () => {
                const now = Date.now();
                if (!isSeeking) {
                    const currentTime = audioPlayer.currentTime;
                    const duration = audioPlayer.duration;
                    currentTimeDisplay.textContent = formatTime(currentTime);
                    progressBar.value = currentTime;
                    
                    // V18: Actualizar el CSS de la barra
                    const progressPercent = (duration > 0) ? (currentTime / duration) * 100 : 0;
                    progressBar.style.setProperty('--progress-percent', `${progressPercent}%`);
                    
                    if (now - lastTimeUpdateSave > 3000) {
                        savePlaybackPosition();
                        lastTimeUpdateSave = now;
                    }
                }
            });
            
            audioPlayer.addEventListener('ended', () => {
                dbSet(STORES.PLAYBACK, 'lastPosition', null);
                // V18: Visualizador eliminado
                
                if (!nextTrackBtn.disabled) {
                    nextTrackBtn.click();
                } else {
                    resetPlayer(true, 'Playlist terminada.');
                }
            });
            
            progressBar.addEventListener('input', () => {
                isSeeking = true;
                const progressPercent = (audioPlayer.duration > 0) ? (progressBar.value / audioPlayer.duration) * 100 : 0;
                progressBar.style.setProperty('--progress-percent', `${progressPercent}%`);
                currentTimeDisplay.textContent = formatTime(progressBar.value);
            });
            progressBar.addEventListener('change', () => {
                audioPlayer.currentTime = progressBar.value;
                isSeeking = false;
            });
            
            dialogAddAudioBtn.addEventListener('click', handleAddAudioClick);
            
            settingsBtn.addEventListener('click', openSettingsDialog);
            settingsCloseBtn.addEventListener('click', closeSettingsDialog);
            settingsScrim.addEventListener('click', (e) => {
                if (e.target === settingsScrim) closeSettingsDialog();
            });
            
            themeButtons.forEach(button => {
                button.addEventListener('click', () => {
                    const mode = button.dataset.themeMode;
                    applyThemeMode(mode);
                    dbSet(STORES.SETTINGS, 'themeMode', mode);
                });
            });
            
            searchInput.addEventListener('input', () => filterCalendar(searchInput.value));
            
            noteBtn.addEventListener('click', openNoteDialog);
            noteCancelBtn.addEventListener('click', closeNoteDialog);
            noteSaveBtn.addEventListener('click', saveNote);
            noteScrim.addEventListener('click', (e) => {
                if (e.target === noteScrim) closeNoteDialog();
            });
            
            // --- INITIALIZATION ---
            const initializeApp = async () => {
                renderWeekdays();
                await initializeSettings(); 
                await loadAllNotes(); 
                await loadAudioMap(); // V17
                renderCalendar(); 
                await loadPlaybackPosition(); 
            };

            initializeApp();
        });
    </script>
</body>
</html>
